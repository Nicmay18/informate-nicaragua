<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panel de noticias</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{font-family:Arial;background:#f2f6fb;margin:0;padding:20px}
form{max-width:600px;margin:auto;background:white;padding:20px;border-radius:8px}
input,textarea,select,button{width:100%;padding:8px;margin-top:8px}
button{background:#0d47a1;color:white;border:none;cursor:pointer}
</style>
</head>
<body>

<h2 style="text-align:center">Panel privado – Noticias</h2>

<form id="form">
  <input id="titulo" placeholder="Título" required>
  <textarea id="resumen" placeholder="Resumen" required></textarea>
  <textarea id="contenido" placeholder="Contenido completo" required></textarea>
  <input id="imagen" placeholder="URL de imagen (.jpg)" required>

  <select id="categoria" required>
    <option value="">Categoría</option>
    <option>Sucesos</option>
    <option>Deportes</option>
    <option>Internacionales</option>
  </select>

  <button type="submit">Publicar noticia</button>
  <p id="msg"></p>
</form>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDVsqRGr7dtdi5ecO14THIdbnEzZKOJxcA",
  authDomain: "informate-instant-nicaragua.firebaseapp.com",
  projectId: "informate-instant-nicaragua",
  storageBucket: "informate-instant-nicaragua.appspot.com",
  messagingSenderId: "24988088146",
  appId: "1:24988088146:web:d26a207508da055668ec8b"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* 🔴 ESTO FALTABA */
const form = document.getElementById("form");
const titulo = document.getElementById("titulo");
const resumen = document.getElementById("resumen");
const contenido = document.getElementById("contenido");
const imagen = document.getElementById("imagen");
const categoria = document.getElementById("categoria");
const msg = document.getElementById("msg");

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  msg.innerText = "Publicando...";

  try {
    await addDoc(collection(db, "noticias"), {
      titulo: titulo.value.trim(),
      resumen: resumen.value.trim(),
      contenido: contenido.value.trim(),
      imagen: imagen.value.trim(),
      categoria: categoria.value,
      fecha: serverTimestamp()
    });

    msg.innerText = "✅ Noticia publicada correctamente";
    form.reset();

  } catch (err) {
    console.error(err);
    msg.innerText = "❌ Error al publicar: " + err.message;
  }
});
</script>

</body>
</html>
