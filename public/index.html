const PROCESSED_KEY = 'noticiasProcesadas_v4';

const getProcessedNews = () => {
  try {
    const data = localStorage.getItem(PROCESSED_KEY);
    const parsed = data ? JSON.parse(data) : {};
    const ahora = Date.now();
    const limite = 7 * 24 * 60 * 60 * 1000;
    Object.keys(parsed).forEach(id => {
      if (ahora - (parsed[id].timestamp || 0) > limite) {
        delete parsed[id];
      }
    });
    return parsed;
  } catch(e) {
    return {};
  }
};

const markNewsAsProcessed = (id, platforms = []) => {
  const processed = getProcessedNews();
  const existing = processed[id] || { platforms: [] };
  processed[id] = {
    timestamp: Date.now(),
    platforms: [...new Set([...existing.platforms, ...platforms])],
    date: new Date().toISOString()
  };
  const entries = Object.entries(processed).slice(-100);
  localStorage.setItem(PROCESSED_KEY, JSON.stringify(Object.fromEntries(entries)));
};

const isNewsProcessed = (id, platform = null) => {
  const processed = getProcessedNews();
  if (!processed[id]) return false;
  if (platform) {
    return processed[id].platforms?.includes(platform) || false;
  }
  return true;
};

const IMAGEN_DEFAULT_TELEGRAM = "https://i.imgur.com/8Km9tLL.jpg";

function obtenerUrlImagen(noticia) {
  let imageUrl = noticia.imagen || '';
  if (!imageUrl || imageUrl === '') {
    return IMAGEN_DEFAULT_TELEGRAM;
  }
  if (imageUrl.startsWith('http://') || imageUrl.startsWith('https://')) {
    return imageUrl;
  }
  return 'https://informate-instant-nicaragua.vercel.app/' + imageUrl.replace(/^\//, '');
}

function getEmoji(categoria) {
  return emoji[categoria] || '📰';
}

// Facebook y Telegram (tus funciones originales)
async function enviarAFacebook(noticia, cuenta) {
  const config = FACEBOOK_CONFIG[cuenta];
  
  if (!config || !config.accessToken || config.accessToken === "") {
    console.log(`⚠️ Facebook ${cuenta}: Token no configurado`);
    return false;
  }
  
  if (isNewsProcessed(noticia.id, `facebook_${cuenta}`)) {
    console.log(`Facebook ${cuenta}: Ya enviado`);
    return true;
  }
  
  try {
    const mensaje = `🔴 ${noticia.categoria.toUpperCase()}

📰 ${noticia.titulo}

${noticia.resumen || noticia.contenido?.substring(0, 200) + '...' || ''}

🔗 https://informate-instant-nicaragua.vercel.app/#${noticia.id}

#Nicaragua #Noticias #${noticia.categoria}`;
    
    const url = `https://graph.facebook.com/v18.0/${config.pageId}/feed`;
    const params = new URLSearchParams({
      message: mensaje,
      link: `https://informate-instant-nicaragua.vercel.app/#${noticia.id}`,
      access_token: config.accessToken
    });
    
    const imageUrl = obtenerUrlImagen(noticia);
    if (imageUrl && (imageUrl.includes('imgur.com') || imageUrl.includes('cloudinary.com') || imageUrl.includes('ibb.co'))) {
      params.append('picture', imageUrl);
    }
    
    const response = await fetch(url, {
      method: 'POST',
      body: params
    });
    
    const result = await response.json();
    if (response.ok && (result.id || result.post_id)) {
      console.log(`✅ Facebook ${cuenta}: Publicado`);
      markNewsAsProcessed(noticia.id, [`facebook_${cuenta}`]);
      mostrarToast(`✅ Facebook ${cuenta === 'cuenta1' ? 'Principal' : 'Secundario'}: Publicado`, 'success');
      return true;
    } else {
      console.error(`Error Facebook ${cuenta}:`, result);
      return false;
    }
  } catch (error) {
    console.error(`Error Facebook ${cuenta}:`, error);
    return false;
  }
}

async function enviarATelegram(noticia) {
  if (!TELEGRAM_BOT_TOKEN || TELEGRAM_BOT_TOKEN === "") {
    console.log("⚠️ Telegram: Token no configurado");
    return false;
  }
  
  if (isNewsProcessed(noticia.id, 'telegram')) {
    console.log(`Telegram: ${noticia.id} ya enviado`);
    return true;
  }
  
  try {
    const imageUrl = obtenerUrlImagen(noticia);
    const catEmoji = getEmoji(noticia.categoria);
    const mensaje = `${catEmoji} *${noticia.categoria.toUpperCase()}*

📰 *${noticia.titulo}*

📝 ${noticia.resumen || noticia.contenido?.substring(0, 200) + '...' || ''}

📲 *Leer noticia completa:*
👉 https://informate-instant-nicaragua.vercel.app/#${noticia.id}

⏰ ${formatearFecha(noticia.fecha)}
👁️ ${noticia.vistas || 0} vistas

🔖 #Nicaragua #${noticia.categoria.replace(/\s/g, '')} #Noticias`;
    
    const formData = new FormData();
    formData.append('chat_id', TELEGRAM_CHAT_ID);
    formData.append('photo', imageUrl);
    formData.append('caption', mensaje);
    formData.append('parse_mode', 'Markdown');
    
    const responsePhoto = await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendPhoto`, {
      method: 'POST',
      body: formData
    });
    
    const resultPhoto = await responsePhoto.json();
    if (responsePhoto.ok && resultPhoto.ok) {
      console.log('✅ Telegram: Enviado con imagen');
      markNewsAsProcessed(noticia.id, ['telegram']);
      mostrarToast(`✅ Telegram: Enviada con imagen`, 'success');
      return true;
    }
    
    const responseMsg = await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        chat_id: TELEGRAM_CHAT_ID,
        text: mensaje,
        parse_mode: 'Markdown',
        disable_web_page_preview: false
      })
    });
    
    if (responseMsg.ok) {
      markNewsAsProcessed(noticia.id, ['telegram']);
      mostrarToast(`✅ Telegram: Enviada`, 'success');
      return true;
    }
  } catch (error) {
    console.error('Error Telegram:', error);
    return false;
  }
}

}

// Contador de visitas
async function incrementarVisita() {
  try {
    const visitanteId = obtenerIdVisitante();
    const hoy = new Date().toDateString();
    const claveVisita = `visita_${hoy}_${visitanteId}`;
    if (localStorage.getItem(claveVisita)) {
      const total = await obtenerTotalVisitas();
      document.getElementById('visitCount').innerText = total.toLocaleString();
      return;
    }
    localStorage.setItem(claveVisita, 'true');
    const statsRef = doc(db, "estadisticas", "visitas");
    await updateDoc(statsRef, {
      total: increment(1),
      ultimaVisita: new Date()
    });
    const total = await obtenerTotalVisitas();
    document.getElementById('visitCount').innerText = total.toLocaleString();
    if (total % 100 === 0) {
      await enviarEstadisticasTelegram(total);
    }
  } catch(e) {
    console.error("Error contador:", e);
  }
}

function obtenerIdVisitante() {
  let id = localStorage.getItem('visitanteId');
  if (!id) {
    id = 'v_' + Math.random().toString(36).substr(2, 9);
    localStorage.setItem('visitanteId', id);
  }
  return id;
}

async function obtenerTotalVisitas() {
  try {
    const statsRef = doc(db, "estadisticas", "visitas");
    const docSnap = await getDoc(statsRef);
    if (docSnap.exists()) {
      return docSnap.data().total || 0;
    } else {
      await setDoc(statsRef, { total: 1, ultimaVisita: new Date() });
      return 1;
    }
  } catch(e) {
    return 0;
  }
}

// Carga principal mejorada
async function cargar(){
  try {
    solicitarPermisoNotificaciones();
    
    // Inicializar módulos si existen
    if (typeof BreakingNews !== 'undefined') BreakingNews.init();
    if (typeof ImageOptimizer !== 'undefined') ImageOptimizer.init();
    
    const q = query(collection(db, "noticias"), orderBy("fecha", "desc"));
    onSnapshot(q, (snap) => {
      const noticiasAnteriores = new Set(todas.map(n => n.id));
      const nuevasNoticias = [];
      snap.forEach(d => {
        const data = d.data();
        data.id = d.id;
        nuevasNoticias.push(data);
        if (!noticiasAnteriores.has(d.id) && noticiasAnteriores.size > 0) {
          console.log('🆕 Nueva noticia:', data.titulo);
          
          // Activar breaking news para noticias urgentes
          if (data.categoria === 'Sucesos' || data.breaking) {
            activarBreakingNews(data);
          }
          
          enviarATelegram(data);
          setTimeout(() => enviarAFacebook(data, 'cuenta1'), 1000);
          setTimeout(() => enviarAFacebook(data, 'cuenta2'), 2000);
          
          mostrarPushNotificacion(data.titulo);
          enviarNotificacionNavegador("🔔 Nueva noticia", data.titulo, data.imagen || "logo.png");
        }
      });
      
      todas = nuevasNoticias.sort((a, b) => {
        const fechaA = a.fecha?.seconds || a.fecha?.toMillis?.() || 0;
        const fechaB = b.fecha?.seconds || b.fecha?.toMillis?.() || 0;
        return fechaB - fechaA;
      });
      
      pintar();
      cargarPopulares();
      
      // Usar nuevo sistema de trending si existe
      if (typeof TrendingEngine !== 'undefined') {
        TrendingEngine.render('trendingContainer', todas);
      } else {
        cargarTrending(); // Fallback
      }
      
      inicializarAdSense();
    });
    incrementarVisita();
  } catch(e) {
    console.error("Error cargando:", e);
    mostrarToast('Error al cargar noticias', 'error');
  }
}

function inicializarAdSense() {
  try {
    if (window.adsbygoogle) {
      const ads = document.querySelectorAll('ins.adsbygoogle:not([data-adsbygoogle-status="done"])');
      ads.forEach(ad => {
        (window.adsbygoogle = window.adsbygoogle || []).push({});
      });
    }
  } catch(e) {
    console.error('Error AdSense:', e);
  }
}

async function incrementarVistasNoticia(id) {
  try {
    const noticiaRef = doc(db, "noticias", id);
    await updateDoc(noticiaRef, { vistas: increment(1) });
    const noticia = todas.find(n => n.id === id);
    if (noticia) {
      noticia.vistas = (noticia.vistas || 0) + 1;
    }
  } catch(e) {
    console.error("Error incrementando vistas:", e);
  }
}

function cargarPopulares(){
  const populares = [...todas]
    .sort((a, b) => (b.vistas || 0) - (a.vistas || 0))
    .slice(0, 5);
    
  const container = document.getElementById("popularPosts");
  if(populares.length === 0){
    container.innerHTML = '<p style="color:#94a3b8;text-align:center;padding:20px;">No hay noticias</p>';
    return;
  }
  container.innerHTML = populares.map((n) => `
    <div style="display:flex;gap:14px;margin-bottom:16px;cursor:pointer;" onclick="abrirPorId('${n.id}')">
      <div style="width:60px;height:60px;border-radius:8px;overflow:hidden;flex-shrink:0;">
        <img src="${n.imagen}" loading="lazy" style="width:100%;height:100%;object-fit:cover;" alt="${n.titulo}">
      </div>
      <div style="flex:1;">
        <div style="font-size:13px;font-weight:700;line-height:1.4;color:#1e293b;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;">
          ${n.titulo}
        </div>
        <div style="font-size:11px;color:#64748b;margin-top:4px;">
          ${n.categoria} • 👁️ ${n.vistas || 0} vistas
        </div>
      </div>
    </div>
  `).join('');
}

// Trending fallback (si no carga el módulo nuevo)
function cargarTrending(){
  const trending = [...todas]
    .sort((a, b) => (b.vistas || 0) - (a.vistas || 0))
    .slice(0, 3);
    
  const container = document.getElementById("trendingContainer");
  
  if (trending.length === 0) {
    container.innerHTML = '<div class="trending-loading">No hay tendencias aún</div>';
    return;
  }
  
  container.innerHTML = trending.map((n, index) => `
    <div class="trending-item" onclick="abrirPorId('${n.id}')">
      <div class="trending-number">${index + 1}</div>
      <div class="trending-title">${n.titulo}</div>
      <div class="trending-meta">
        <i class="fas fa-fire"></i> ${n.vistas || 0} vistas • ${formatearFecha(n.fecha)} • ${n.categoria}
      </div>
    </div>
  `).join('');
}

function pintar(){
  const portada = document.getElementById("portada");
  portada.innerHTML = "";
  document.getElementById("lista").innerHTML = "";

  let datos = categoria === "Todas" ? todas : todas.filter(n => n.categoria === categoria);
  
  if(!datos.length){
    document.getElementById("lista").innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:60px;color:#64748b;">
      <div style="font-size:48px;margin-bottom:16px;">📭</div>
      <p>No hay noticias en esta categoría</p>
    </div>`;
    return;
  }

  const principal = datos[0];
  const laterales = datos.slice(1, 4);
  const resto = datos.slice(4, 12);

  if(principal){
    const hero = document.createElement("div");
    hero.className = "hero-layout";
    hero.innerHTML = `
      <div class="hero-main" onclick="abrirPorId('${principal.id}')">
        <img src="${principal.imagen}" loading="lazy" alt="${principal.titulo}">
        <div class="hero-content">
          <span class="hero-badge"><i class="fas fa-circle" style="font-size:8px;"></i> ${principal.categoria}</span>
          <h2>${principal.titulo}</h2>
          <p>${principal.resumen || principal.contenido?.substring(0, 150) + '...' || ''}</p>
          <div class="hero-meta">
            <span><i class="far fa-calendar"></i> ${formatearFecha(principal.fecha)}</span>
            <span><i class="far fa-eye"></i> ${principal.vistas || 0} vistas</span>
          </div>
        </div>
      </div>
      <div class="hero-side">
        ${laterales.map(n => `
          <div class="side-item" onclick="abrirPorId('${n.id}')">
            <img src="${n.imagen}" loading="lazy" alt="${n.titulo}">
            <div class="side-content">
              <span class="side-tag ${n.categoria}">${n.categoria}</span>
              <h3>${n.titulo}</h3>
              <div style="font-size:12px;color:#64748b;margin-top:8px;">
                <i class="fas fa-eye"></i> ${n.vistas || 0} vistas
              </div>
            </div>
          </div>
        `).join("")}
      </div>
    `;
    portada.appendChild(hero);
  }

  resto.forEach((n, index) => {
    const card = document.createElement("div");
    card.className = "card";
    card.onclick = () => abrirPorId(n.id);
    card.innerHTML = `
      <div class="card-image-wrapper">
        <img src="${n.imagen}" loading="lazy" alt="${n.titulo}">
        <div class="card-overlay">
          <span class="card-overlay-text">Leer artículo <i class="fas fa-arrow-right"></i></span>
        </div>
      </div>
      <div class="card-body">
        <span class="tag ${n.categoria}">${n.categoria}</span>
        <h3>${n.titulo}</h3>
        <p>${n.resumen || n.contenido?.substring(0, 120) + '...' || ''}</p>
        <div class="card-footer">
          <span><i class="far fa-clock"></i> ${formatearFecha(n.fecha)}</span>
          <span><i class="fas fa-eye"></i> ${n.vistas || 0} vistas</span>
        </div>
      </div>
    `;
    document.getElementById("lista").appendChild(card);
    
    if ((index + 1) % 4 === 0 && index < resto.length - 1) {
      const adDiv = document.createElement("div");
      adDiv.className = "ad-container ad-inline";
      adDiv.innerHTML = `
        <ins class="adsbygoogle"
             style="display:block"
             data-ad-client="ca-pub-4115203339551838"
             data-ad-slot="8408634019"
             data-ad-format="auto"
             data-full-width-responsive="true"></ins>
      `;
      document.getElementById("lista").appendChild(adDiv);
    }
  });
}

window.abrirPorId = async function(id){
  const n = todas.find(x => x.id === id);

};

function abrir(n){
  currentNoticia = n;
  document.getElementById("mCat").className = "tag " + n.categoria;
  document.getElementById("mCat").innerText = n.categoria;
  document.getElementById("mTitulo").innerText = n.titulo;
  document.getElementById("mImg").src = n.imagen;
  document.getElementById("mCont").innerHTML = formatearContenido(n.contenido);
  document.getElementById("mFecha").innerHTML = `<i class="far fa-calendar"></i> ${formatearFecha(n.fecha)}`;
  document.getElementById("viewCount").innerText = n.vistas || 0;
  document.getElementById("modal").style.display = "flex";
  document.body.style.overflow = "hidden";
  history.pushState({id: n.id}, n.titulo, "#" + n.id);
  
  setTimeout(() => {
    if (window.adsbygoogle) {
      const modalAd = document.querySelector('#modalContent .adsbygoogle');
      if (modalAd && !modalAd.getAttribute('data-adsbygoogle-status')) {

}

function formatearContenido(texto) {
  if (!texto) return '<p style="color:#94a3b8;">Contenido no disponible</p>';
  return texto.split('\n\n').map(p => `<p>${p.replace(/\n/g, '<br>')}</p>`).join('');
}

window.cerrarModal = function(){
  document.getElementById("modal").style.display = "none";
  document.body.style.overflow = "";
  history.pushState({}, document.title, window.location.pathname);
  currentNoticia = null;
};

function formatearFecha(fecha){
  if(!fecha) return "Fecha no disponible";
  if(fecha.toDate){
    const d = fecha.toDate();
    const ahora = new Date();
    const diff = (ahora - d) / 1000;
    if (diff < 60) return 'Hace un momento';
    if (diff < 3600) return `Hace ${Math.floor(diff/60)} min`;
    if (diff < 86400) return `Hace ${Math.floor(diff/3600)} horas`;
    if (diff < 172800) return 'Ayer';
    return d.toLocaleString("es-NI", {day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit'});
  }
  return fecha;
}

// Clima de Managua
async function cargarClima(){
  try {
    const response = await fetch('https://api.open-meteo.com/v1/forecast?latitude=12.13&longitude=-86.25&current_weather=true&timezone=America/Managua');
    const data = await response.json();
    const temp = Math.round(data.current_weather.temperature);
    const climaDiv = document.getElementById("clima");
    
    let icono = '☀️';
    const weatherCode = data.current_weather.weathercode;
    if (weatherCode >= 1 && weatherCode <= 3) icono = '⛅';
    else if (weatherCode >= 45 && weatherCode <= 48) icono = '🌫️';
    else if (weatherCode >= 51 && weatherCode <= 67) icono = '🌧️';
    else if (weatherCode >= 71 && weatherCode <= 77) icono = '❄️';
    else if (weatherCode >= 80 && weatherCode <= 82) icono = '🌦️';
    else if (weatherCode >= 95) icono = '⛈️';
    
    climaDiv.innerHTML = `${icono} Managua ${temp}°C`;
  } catch(e) {
    document.getElementById("clima").innerHTML = '🌡️ Managua --°C';
  }
}
cargarClima();
setInterval(cargarClima, 300000);
