<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="meta-title">Cargando Noticia... | Nicaragua Informate</title>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,700;1,400&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --rojo: #d0021b; --azul: #003366; --negro: #1a1a1a; --gris-suave: #f8f9fa; }
        body { font-family: 'Inter', sans-serif; margin: 0; color: var(--negro); line-height: 1.6; }

        /* Barra de progreso de lectura */
        .progress-container { position: fixed; top: 0; z-index: 2000; width: 100%; height: 4px; background: transparent; }
        .progress-bar { height: 4px; background: var(--rojo); width: 0%; transition: width 0.1s; }

        /* Cabecera de Impacto (Estilo TV) */
        .news-header-hero { position: relative; width: 100%; height: 70vh; min-height: 400px; background: #000; overflow: hidden; }
        
        /* Marca de agua con texto estilo TN8 */
        .news-header-hero::after {
            content: "informate nicaragua";
            position: absolute;
            top: 20px;
            right: 20px;
            font-family: 'Inter', sans-serif;
            font-size: 1.5rem;
            font-weight: 900;
            color: rgba(255, 255, 255, 0.7);
            text-transform: lowercase;
            letter-spacing: -1px;
            z-index: 100;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.8);
            pointer-events: none;
            line-height: 1;
        }
        
        .hero-img { width: 100%; height: 100%; object-fit: cover; opacity: 0.7; }

        .hero-overlay {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 70%;
            background: linear-gradient(to top, rgba(0,0,0,1) 10%, transparent);
            display: flex; align-items: flex-end; padding: 40px 5%; box-sizing: border-box;
        }

        .hero-content { max-width: 900px; color: white; }
        .badge-cat { 
            background: var(--rojo); color: white; padding: 5px 12px; 
            font-weight: 800; text-transform: uppercase; font-size: 0.8rem; margin-bottom: 15px; display: inline-block;
        }
        h1.main-title { 
            font-family: 'Inter', sans-serif; font-weight: 800; font-size: clamp(2rem, 5vw, 3.5rem); 
            line-height: 1.1; margin: 0; text-transform: uppercase;
        }

        /* Cuerpo de la Noticia */
        .container-reading { max-width: 800px; margin: 40px auto; padding: 0 20px; }
        .meta-info { 
            display: flex; gap: 20px; color: #666; font-size: 0.9rem; 
            border-bottom: 1px solid #eee; padding-bottom: 20px; margin-bottom: 30px; 
        }

        #news-content { font-family: 'Merriweather', serif; font-size: 1.2rem; color: #333; line-height: 1.9; }
        #news-content p { margin-bottom: 1.8rem; }

        /* Noticias Relacionadas Pro */
        .related-section { background: var(--gris-suave); padding: 60px 20px; margin-top: 60px; }
        .related-grid { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); 
            gap: 25px; max-width: 1100px; margin: 0 auto; 
        }
        .related-card { text-decoration: none; color: inherit; background: white; transition: 0.3s; }
        .related-card:hover { transform: translateY(-5px); }
        .related-card img { width: 100%; aspect-ratio: 16/9; object-fit: cover; }
        .related-card h4 { padding: 15px; margin: 0; font-size: 1rem; line-height: 1.4; }

        /* Publicidad Adaptativa */
        .ad-container { margin: 40px 0; text-align: center; background: #fafafa; border: 1px solid #eee; min-height: 250px; display: flex; align-items: center; justify-content: center; }

        @media (max-width: 768px) {
            .news-header-hero { height: 50vh; }
            h1.main-title { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <div class="progress-container"><div class="progress-bar" id="myBar"></div></div>

    <article>
        <header class="news-header-hero">
            <img id="main-img" src="" class="hero-img" alt="">
            <div class="hero-overlay">
                <div class="hero-content">
                    <span id="category" class="badge-cat">Sucesos</span>
                    <h1 id="title" class="main-title">Cargando noticia...</h1>
                </div>
            </div>
        </header>

        <div class="container-reading">
            <div class="meta-info">
                <span><i class="far fa-calendar-alt"></i> <span id="date">--/--/--</span></span>
                <span><i class="far fa-user"></i> Por Redacción</span>
                <span><i class="far fa-eye"></i> <span id="views"></span> vistas</span>
            </div>

            <div id="news-content">
                </div>

            <div class="ad-container">
                <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-XXXXX" data-ad-slot="XXXXX" data-ad-format="auto"></ins>
            </div>
        </div>
    </article>

    <section class="related-section" id="relatedSection" style="display:none;">
        <div style="max-width: 1100px; margin: 0 auto 30px;">
            <h3 style="font-family: 'Inter'; text-transform: uppercase; border-left: 4px solid var(--rojo); padding-left: 15px;">También te puede interesar</h3>
        </div>
        <div class="related-grid" id="relatedGrid"></div>
    </section>

    <script type="module">
        // Importar Firebase
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { initializeFirestore, memoryLocalCache, collection, doc, getDoc, getDocs, query, orderBy, limit, where, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        // Configuración Firebase
        const app = initializeApp({
            apiKey: "AIzaSyDVsqRGr7dtdi5ecO14THIdbnEzKKOJxcA",
            authDomain: "informate-instant-nicaragua.firebaseapp.com",
            projectId: "informate-instant-nicaragua",
            storageBucket: "informate-instant-nicaragua.firebasestorage.app",
            messagingSenderId: "24988088146",
            appId: "1:24988088146:web:d26a207508da055668ec8b"
        });

        const db = initializeFirestore(app, { localCache: memoryLocalCache() });
        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get('id');

        // Cargar noticia
        async function loadArticle() {
            console.log('loadArticle iniciado, ID:', id);
            
            if (!id) {
                alert('No se encontró el ID de la noticia');
                window.location.href = '/';
                return;
            }

            const docRef = doc(db, "noticias", id);
            
            try {
                const docSnap = await getDoc(docRef);
                
                if (docSnap.exists()) {
                    const n = docSnap.data();
                    console.log('Datos de la noticia:', n);
                    
                    // 1. Títulos y Meta
                    document.title = n.titulo + " | Nicaragua Informate";
                    document.getElementById('title').innerText = n.titulo;
                    document.getElementById('category').innerText = n.categoria;
                    
                    // 2. Imagen Principal (Aquí es donde ocurre la magia TN8)
                    const mainImg = document.getElementById('main-img');
                    mainImg.src = n.imagen || 'https://nicaraguainformate.com/logo.png';
                    mainImg.alt = n.titulo;
                    
                    // 3. Fecha (Formateo profesional)
                    const fecha = n.fecha?.toDate ? n.fecha.toDate() : new Date();
                    document.getElementById('date').innerText = fecha.toLocaleDateString('es-NI', {
                        day: '2-digit', 
                        month: 'long', 
                        year: 'numeric'
                    });
                    
                    // 4. Vistas
                    document.getElementById('views').textContent = ((n.vistas || 0) + 1).toLocaleString();
                    
                    // Incrementar vistas
                    updateDoc(docRef, { vistas: increment(1) }).catch(() => {});
                    
                    // 5. Contenido (Limpiar y mostrar)
                    // Si el contenido viene con saltos de línea, los convertimos a párrafos
                    const contenidoLimpio = n.contenido.replace(/\n/g, '<br><br>');
                    document.getElementById('news-content').innerHTML = contenidoLimpio;
                    
                    // 6. Cargar Relacionadas (Sin que el usuario lo note)
                    cargarNoticiasRelacionadas(n.categoria, id);
                    
                } else {
                    console.error('Documento no existe');
                    window.location.href = 'index.html'; // Si no existe, vuelve al inicio
                }
                
            } catch (error) {
                console.error("Error cargando noticia:", error);
                alert('Error al cargar la noticia');
            }
        }

        async function cargarNoticiasRelacionadas(categoria, excludeId) {
            try {
                const ref = collection(db, 'noticias');
                let q = query(ref, where('categoria', '==', categoria), limit(5));
                let snap = await getDocs(q);
                let rel = snap.docs
                    .map(d => ({ id: d.id, ...d.data() }))
                    .filter(n => n.id !== excludeId);

                if (rel.length < 3) {
                    const q2 = query(ref, orderBy('fecha', 'desc'), limit(6));
                    const snap2 = await getDocs(q2);
                    const recientes = snap2.docs
                        .map(d => ({ id: d.id, ...d.data() }))
                        .filter(n => n.id !== excludeId);
                    rel = [...new Map([...rel, ...recientes].map(item => [item.id, item])).values()].slice(0, 4);
                }

                if (rel.length === 0) return;

                document.getElementById('relatedSection').style.display = 'block';
                document.getElementById('relatedGrid').innerHTML = rel.map(n => {
                    const img = n.imagen && !n.imagen.includes('facebook')
                        ? n.imagen
                        : 'https://images.unsplash.com/photo-1504711434969-e33886168f5c?w=400&q=60';
                    return `
                        <a href="noticia.html?id=${n.id}" class="related-card">
                            <img src="${img}" loading="lazy" alt="${escapeHtml(n.titulo || '')}">
                            <h4>${escapeHtml(n.titulo || '')}</h4>
                        </a>
                    `;
                }).join('');

            } catch (error) {
                console.error("Error cargando relacionadas:", error);
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Cargar
        loadArticle();

        // Registrar Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').catch(() => {});
            });
        }
    </script>
    
    <script>
        // Lógica de barra de progreso
        window.onscroll = function() {
            let winScroll = document.body.scrollTop || document.documentElement.scrollTop;
            let height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            let scrolled = (winScroll / height) * 100;
            document.getElementById("myBar").style.width = scrolled + "%";
        };
    </script>
</body>
</html>
