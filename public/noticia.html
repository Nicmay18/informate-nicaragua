<!-- noticia.html - Drop cap profesional -->
<style>
.article-content {
  font-size: 18px;
  line-height: 1.8;
  color: var(--text-primary);
}
.article-content p {
  margin-bottom: 24px;
}
/* PRIMERA LETRA GRANDE (Drop Cap) */
.article-content > p:first-of-type::first-letter {
  font-family: var(--font-serif);
  font-size: 4.5em;
  float: left;
  line-height: 0.8;
  margin-right: 12px;
  margin-top: 8px;
  font-weight: 900;
  color: var(--brand-accent);
}
/* Selección de texto */
::selection {
  background: var(--brand-accent);
  color: white;
}
</style>
