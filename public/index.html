<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Nicaragua Informate al Instante</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root{
  --azul:#0d47a1;
  --azul2:#1565c0;
  --sucesos:#c62828;
  --deportes:#2e7d32;
  --inter:#6a1b9a;
  --gris:#f3f5f9;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:Segoe UI,Arial,Helvetica,sans-serif;
  background:#ffffff;
  color:#222;
}

/* ================= HEADER ================= */

.topbar{
  background:linear-gradient(90deg,var(--azul),var(--azul2));
  color:#fff;
  padding:10px 14px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
}

.logo{
  display:flex;
  align-items:center;
  gap:10px;
  font-weight:600;
  font-size:18px;
}

.logo img{
  width:46px;
  height:46px;
  border-radius:50%;
  animation:spin 10s linear infinite;
}

@keyframes spin{
  from{transform:rotateY(0deg)}
  to{transform:rotateY(360deg)}
}

.infoTop{
  font-size:13px;
  text-align:right;
}

/* ================= MENU ================= */

.menu{
  background:#fff;
  display:flex;
  justify-content:center;
  gap:20px;
  padding:10px;
  border-bottom:1px solid #ddd;
  position:sticky;
  top:0;
  z-index:50;
}

.menu button{
  border:none;
  background:none;
  font-weight:600;
  color:#444;
  cursor:pointer;
  padding:6px 4px;
  font-size:14px;
}

.menu button.active{
  color:var(--azul);
  border-bottom:3px solid var(--azul);
}

/* ================= RADIO ================= */

.radio{
  text-align:center;
  padding:10px 0;
  background:var(--gris);
}

.radio audio{
  width:240px;
}

/* ================= CONTENEDOR ================= */

.container{
  max-width:1100px;
  margin:auto;
  padding:16px;
}

/* ================= GRID ================= */

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
  gap:18px;
}

/* ================= CARD ================= */

.card{
  background:#fff;
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 6px 18px rgba(0,0,0,.08);
  cursor:pointer;
  display:flex;
  flex-direction:column;
  transition:transform .2s, box-shadow .2s;
  animation:fade .5s ease;
}

@keyframes fade{
  from{opacity:0;transform:translateY(15px)}
  to{opacity:1;transform:translateY(0)}
}

.card:hover{
  transform:translateY(-4px);
  box-shadow:0 10px 24px rgba(0,0,0,.15);
}

.card img{
  width:100%;
  height:200px;
  object-fit:cover;
}

.card-body{
  padding:12px 14px 16px 14px;
  flex:1;
}

.tag{
  display:inline-block;
  padding:3px 8px;
  border-radius:6px;
  font-size:11px;
  color:#fff;
  margin-bottom:6px;
}

.tag.Sucesos{background:var(--sucesos)}
.tag.Deportes{background:var(--deportes)}
.tag.Internacionales{background:var(--inter)}

.card h3{
  margin:6px 0 6px 0;
  font-size:17px;
  line-height:1.25;
}

.card p{
  margin:0;
  font-size:14px;
  color:#555;
}

/* ================= MODAL ================= */

#modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.75);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:999;
  padding:10px;
}

#modalContent{
  background:#fff;
  width:100%;
  max-width:900px;
  max-height:90vh;
  overflow:auto;
  border-radius:12px;
  padding:16px;
}

#modalContent img{
  width:100%;
  max-height:70vh;
  object-fit:contain;
  background:#000;
  border-radius:8px;
  margin:10px 0;
}

#modalContent h2{
  margin:8px 0 4px 0;
}

/* ================= FOOTER ================= */

.footer{
  margin-top:40px;
  background:#0f1b2d;
  color:#fff;
  padding:20px 10px;
}

.footerBox{
  max-width:1100px;
  margin:auto;
  display:flex;
  flex-wrap:wrap;
  gap:20px;
  justify-content:space-between;
  align-items:flex-start;
}

.stats{
  display:flex;
  gap:10px;
  font-size:13px;
  line-height:1.6;
}

.stats img{
  width:34px;
  height:34px;
  object-fit:contain;
  flex-shrink:0;
}

.redes img{
  width:32px;
  margin-right:10px;
}

.visitas{
  margin-top:8px;
  font-size:12px;
  color:#ccc;
}

/* ================= RESPONSIVE ================= */

@media(max-width:600px){
  .card img{height:170px}
}
</style>
</head>

<body>

<div class="topbar">
  <div class="logo">
    <img src="logo.png">
    Nicaragua Informate al Instante
  </div>

  <div class="infoTop">
    <div id="hora"></div>
    <div id="clima">Managua: --°C</div>
  </div>
</div>

<div class="menu">
  <button class="active" onclick="cambiar('Todas',this)">Última hora</button>
  <button onclick="cambiar('Sucesos',this)">Sucesos</button>
  <button onclick="cambiar('Deportes',this)">Deportes</button>
  <button onclick="cambiar('Internacionales',this)">Internacionales</button>
</div>

<div class="radio">
  🎙 Radio en vivo<br>
  <audio controls src="PEGA_AQUI_TU_STREAM_RADIO"></audio>
</div>

<div class="container">
  <div id="lista" class="grid">
    Cargando noticias...
  </div>
</div>

<!-- MODAL -->

<div id="modal" onclick="cerrar()">
  <div id="modalContent" onclick="event.stopPropagation()">
    <span id="mCat" class="tag"></span>
    <h2 id="mTitulo"></h2>
    <p id="mFecha" style="color:#666;font-size:13px"></p>
    <img id="mImg">
    <p id="mCont" style="line-height:1.6"></p>
  </div>
</div>

<!-- FOOTER -->

<div class="footer">
  <div class="footerBox">

    <div class="stats">
      <img src="https://cdn-icons-png.flaticon.com/512/1828/1828884.png">
      <div>
        <strong>Indicadores – Nicaragua</strong><br>
        Dólar BCN: C$ 36.6243<br>
        Gasolina Regular: C$ 47.84 / ltr<br>
        Gasolina Súper: C$ 49.03 / ltr<br>
        Diésel: C$ 43.21 / ltr
      </div>
    </div>

    <div>
      <div class="redes">
        <a href="https://www.facebook.com/profile.php?id=61578261125687" target="_blank">
          <img src="https://cdn-icons-png.flaticon.com/512/124/124010.png">
        </a>
        <a href="https://whatsapp.com/channel/0029VbC3gewG8l5GEFHoAy0L" target="_blank">
          <img src="https://cdn-icons-png.flaticon.com/512/124/124034.png">
        </a>
        <a href="https://t.me/fHHjncJqMQM3NjZh" target="_blank">
          <img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png">
        </a>
      </div>
      <div id="visitas" class="visitas"></div>
    </div>

  </div>
</div>

<!-- ================= FIREBASE ================= -->

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore,collection,getDocs,query,orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDVsqRGr7dtdi5ecO14THIdbnEzZKOJxcA",
  authDomain: "informate-instant-nicaragua.firebaseapp.com",
  projectId: "informate-instant-nicaragua",
  storageBucket: "informate-instant-nicaragua.appspot.com",
  messagingSenderId: "24988088146",
  appId: "1:24988088146:web:d26a207508da055668ec8b"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let todas=[];
let categoria="Todas";

const lista=document.getElementById("lista");

async function cargar(){
  const q=query(collection(db,"noticias"),orderBy("fecha","desc"));
  const snap=await getDocs(q);
  todas=[];
  snap.forEach(d=>todas.push(d.data()));
  pintar();
}

function pintar(){

  lista.innerHTML="";

  let datos;

  if(categoria==="Todas"){
    datos=todas.slice(0,6);   // última hora
  }else{
    datos=todas.filter(n=>n.categoria===categoria);
  }

  if(!datos.length){
    lista.innerHTML="No hay noticias.";
    return;
  }

  datos.forEach(n=>{

    const card=document.createElement("div");
    card.className="card";

    card.innerHTML=`
      <img src="${n.imagen}">
      <div class="card-body">
        <span class="tag ${n.categoria}">${n.categoria}</span>
        <h3>${n.titulo}</h3>
        <p>${n.resumen}</p>
      </div>
    `;

    card.onclick=()=>abrir(n);

    lista.appendChild(card);
  });

}

window.cambiar=function(cat,btn){
  categoria=cat;
  document.querySelectorAll(".menu button").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  pintar();
}

function abrir(n){
  mCat.className="tag "+n.categoria;
  mCat.innerText=n.categoria;
  mTitulo.innerText=n.titulo;
  mImg.src=n.imagen;
  mCont.innerText=n.contenido;
  mFecha.innerText=n.fecha?.toDate().toLocaleString("es-NI")||"";
  modal.style.display="flex";
}

window.cerrar=()=>modal.style.display="none";

cargar();
</script>

<script>
/* Hora */
const horaEl=document.getElementById("hora");
function hora(){
  horaEl.innerText=new Date().toLocaleString("es-NI");
}
setInterval(hora,1000);hora();

/* Clima */
const climaEl=document.getElementById("clima");
async function clima(){
  try{
    const r=await fetch("https://api.open-meteo.com/v1/forecast?latitude=12.1364&longitude=-86.2514&current_weather=true");
    const d=await r.json();
    climaEl.innerText="Managua: "+d.current_weather.temperature+"°C";
  }catch{}
}
clima();

/* Visitas */
let v=localStorage.getItem("visitas_inf")||0;
v++;
localStorage.setItem("visitas_inf",v);
document.getElementById("visitas").innerText="Visitas: "+v;
</script>

</body>
</html>
