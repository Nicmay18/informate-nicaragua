    body{font-family:'Segoe UI',sans-serif;background:#eef2f7;color:#1e293b;min-height:100vh;display:flex;flex-direction:column}
    header{background:linear-gradient(135deg,#1a56db,#1e3a8a);padding:16px 24px;display:flex;align-items:center;gap:12px}

    .btn{background:#1a56db;color:#fff;padding:14px 32px;border-radius:9999px;text-decoration:none;font-weight:700;font-size:15px;transition:all .2s;display:inline-block}
    .btn:hover{background:#1e40af;transform:translateY(-2px)}
    .links{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;margin-top:16px;position:relative;z-index:1}
    .link{color:#1a56db;text-decoration:none;font-size:14px;font-weight:600}
    .link:hover{text-decoration:underline}
    footer{background:#1e293b;color:#94a3b8;text-align:center;padding:20px;font-size:13px}
